name: 🤖 Daily AI Blog Post Generator

# ── WHEN TO RUN ──────────────────────────────────────────
on:
  schedule:
    - cron: '0 9 * * *'    # Every day at 9:00 AM UTC
  workflow_dispatch:         # Also lets you click "Run" manually in GitHub UI

# ── THE JOB ──────────────────────────────────────────────
jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out your repo
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install and start Ollama (Paperclip AI backend)
      - name: 🤖 Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          
      - name: ▶️ Start Ollama Service
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          sleep 8
          
      - name: 📦 Pull AI Model
        run: |
          ollama pull llama3
          echo "Model ready!"

      # 4. Generate the blog post
      - name: ✍️ Generate Blog Post
        run: node scripts/generate-blog.js

      # 5. Commit and push the new files
      - name: 📤 Commit and Push
        run: |
          git config --global user.name "AI Blog Bot 🤖"
          git config --global user.email "actions@github.com"
          git add .
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-post: $(date +'%Y-%m-%d')"
            git push
            echo "✅ Pushed to GitHub successfully!"
          fi

      # 6. Show the log
      - name: 📋 Show Run Log
        if: always()
        run: |
          echo "=== Last 30 lines of run log ==="
          tail -30 scripts/run.log || echo "No log file found"
